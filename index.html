<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Korila Economy</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">

    <!-- ログイン画面 -->
    <section id="authSection">
      <h2>ログイン / 登録</h2>
      <input id="username" placeholder="ユーザー名">
      <input id="email" placeholder="メール">
      <input id="password" type="password" placeholder="パスワード">
      <button id="signupBtn">登録</button>
      <button id="loginBtn">ログイン</button>
    </section>

    <!-- ゲーム本体 -->
    <section id="appSection" class="hidden">

      <h2 id="welcomeText"></h2>
      <div id="titleText"></div>

      <div>
        お金: <span id="moneyText">0</span>
      </div>

      <button id="gatherBtn">採取</button>

      <h3>資源</h3>
      <div>
        木: <span id="woodText"></span>
        石: <span id="stoneText"></span>
        鉄: <span id="ironText"></span>
        金: <span id="goldText"></span>
        ダイヤ: <span id="diamondText"></span>
      </div>

      <button id="logoutBtn">ログアウト</button>

    </section>

    <div id="message"></div>
    <div id="toastContainer"></div>

  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
